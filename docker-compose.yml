services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      target: server-build
    command: npm run dev
    working_dir: /app/server
    restart: unless-stopped
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/flowsync
      JWT_SECRET: replace-with-a-secure-secret
    ports:
      - "5001:5001"
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
    depends_on:
      - mongo

  client:
    image: node:22-alpine
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    working_dir: /app/client
    environment:
      VITE_API_URL: http://localhost:5001/api
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
      - /app/client/node_modules
    depends_on:
      - server

volumes:
  mongo-data:
